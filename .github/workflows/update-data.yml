name: Update container market data

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour, UTC
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run fetchers
        run: |
          python scripts/fetch_worldbank_teu.py
          python scripts/fetch_portwatch.py
          # Add more fetch scripts here as you build them, e.g.:
          # python scripts/fetch_dwell_times.py
          # python scripts/fetch_ais_vessels.py

      - name: Commit updated data if anything changed
        run: |
          git config user.name "backhaul-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Hourly data refresh"
          git push
