name: Hourly data refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetchers
        run: |
          python scripts/fetch_worldbank_teu.py
          python scripts/fetch_portwatch.py
          python scripts/fetch_fbx_rates.py

      - name: Commit updated data if anything changed
        run: |
          git config user.name "backhaul-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Hourly data refresh"
          git push
